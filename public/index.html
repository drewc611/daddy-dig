<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>test LLM</title>
    <style>
      :root {
        --primary-color: #6d28d9;
        --primary-hover: #5b21b6;
        --accent-color: #22d3ee;
        --light-bg: #f8fafc;
        --border-color: #e2e8f0;
        --text-color: #0f172a;
        --text-light: #64748b;
        --user-msg-bg: #eef2ff;
        --assistant-msg-bg: #f1f5f9;
        --surface: #ffffff;
        --surface-muted: rgba(255, 255, 255, 0.75);
        --shadow-color: rgba(15, 23, 42, 0.12);
        --ring-color: rgba(109, 40, 217, 0.25);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu,
          Cantarell, sans-serif;
        line-height: 1.6;
        color: var(--text-color);
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(109, 40, 217, 0.12), transparent 45%),
          radial-gradient(circle at top right, rgba(34, 211, 238, 0.18), transparent 40%),
          #f8fafc;
        padding: 2rem 1.5rem 3rem;
      }

      .page {
        max-width: 960px;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        gap: 1.75rem;
      }

      header {
        text-align: center;
        padding: 1.5rem;
        border-radius: 20px;
        background: var(--surface-muted);
        border: 1px solid rgba(226, 232, 240, 0.8);
        box-shadow: 0 20px 40px var(--shadow-color);
        backdrop-filter: blur(18px);
      }

      h1 {
        font-size: 1.9rem;
        color: var(--text-color);
        letter-spacing: -0.02em;
      }

      .subtitle {
        margin-top: 0.4rem;
        color: var(--text-light);
      }

      .tagline {
        margin-top: 0.75rem;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.35rem 0.85rem;
        border-radius: 999px;
        background: rgba(109, 40, 217, 0.12);
        color: var(--primary-color);
        font-size: 0.75rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .utility-panel {
        padding: 1.25rem 1.5rem;
        border-radius: 18px;
        background: var(--surface-muted);
        border: 1px solid rgba(226, 232, 240, 0.8);
        box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08);
        backdrop-filter: blur(18px);
        display: flex;
        flex-direction: column;
        gap: 0.85rem;
      }

      .utility-panel h2 {
        font-size: 1.1rem;
        color: var(--text-color);
      }

      .utility-panel p {
        color: var(--text-light);
      }

      .lookup-form {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
      }

      #address-input {
        flex: 1;
        min-width: 220px;
        padding: 0.7rem 0.9rem;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-family: inherit;
        background: var(--light-bg);
        transition: border 0.2s ease, box-shadow 0.2s ease;
      }

      #address-input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px var(--ring-color);
        background: var(--surface);
      }

      #address-button {
        padding: 0.65rem 1.2rem;
        min-height: 44px;
        border-radius: 12px;
        border: none;
        background: var(--primary-color);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
        box-shadow: 0 12px 24px rgba(109, 40, 217, 0.2);
      }

      #address-button:hover {
        transform: translateY(-1px);
        background: var(--primary-hover);
      }

      #address-button:disabled {
        cursor: not-allowed;
        box-shadow: none;
        background: var(--text-light);
        transform: none;
      }

      .lookup-status {
        font-size: 0.85rem;
        color: var(--text-light);
      }

      .lookup-results {
        list-style: none;
        display: grid;
        gap: 0.75rem;
      }

      .lookup-result {
        padding: 0.75rem 0.9rem;
        border-radius: 12px;
        background: var(--surface);
        border: 1px solid rgba(226, 232, 240, 0.8);
        box-shadow: 0 10px 20px rgba(15, 23, 42, 0.06);
      }

      .lookup-result strong {
        display: block;
        margin-bottom: 0.25rem;
      }

      .lookup-meta {
        font-size: 0.8rem;
        color: var(--text-light);
      }

      .chat-container {
        display: flex;
        flex-direction: column;
        height: calc(100vh - 200px);
        min-height: 400px;
        border-radius: 20px;
        overflow: hidden;
        background: var(--surface);
        border: 1px solid rgba(226, 232, 240, 0.9);
        box-shadow: 0 24px 50px var(--shadow-color);
      }

      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 1rem;
        background-color: var(--light-bg);
        background-image: linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.9),
            rgba(248, 250, 252, 0.8)
          ),
          radial-gradient(circle at top left, rgba(109, 40, 217, 0.08), transparent 35%),
          radial-gradient(circle at bottom right, rgba(34, 211, 238, 0.12), transparent 40%);
      }

      .message {
        margin-bottom: 1rem;
        padding: 0.85rem 1rem;
        border-radius: 14px;
        max-width: 80%;
        box-shadow: 0 12px 24px rgba(15, 23, 42, 0.06);
      }

      .message-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 0.5rem;
        margin-bottom: 0.35rem;
        font-size: 0.75rem;
        color: var(--text-light);
      }

      .message-timestamp {
        margin-left: auto;
        white-space: nowrap;
      }

      .user-message {
        background-color: var(--user-msg-bg);
        align-self: flex-end;
        margin-left: auto;
      }

      .assistant-message {
        background-color: var(--assistant-msg-bg);
        align-self: flex-start;
      }

      .message-input {
        display: flex;
        padding: 0.75rem;
        border-top: 1px solid var(--border-color);
        background-color: var(--surface);
      }

      .chat-status {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.5rem 0.75rem 0;
        border-top: 1px solid var(--border-color);
        background-color: var(--surface);
        font-size: 0.9rem;
      }

      .context-status {
        color: var(--text-light);
        font-size: 0.75rem;
        letter-spacing: 0.01em;
      }

      .presence-status {
        color: var(--text-light);
        font-size: 0.75rem;
        padding: 0.2rem 0.55rem;
        border-radius: 999px;
        border: 1px solid var(--border-color);
        background: var(--surface);
        transition: all 0.2s ease;
      }

      .presence-status.active {
        color: var(--primary-color);
        border-color: rgba(109, 40, 217, 0.35);
        box-shadow: 0 0 18px rgba(109, 40, 217, 0.2);
        background: rgba(109, 40, 217, 0.1);
      }

      #user-input {
        flex: 1;
        padding: 0.75rem;
        border: 1px solid var(--border-color);
        border-radius: 12px;
        font-family: inherit;
        resize: none;
        min-height: 44px;
        background: var(--light-bg);
        transition: border 0.2s ease, box-shadow 0.2s ease;
      }

      #user-input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px var(--ring-color);
        background: var(--surface);
      }

      #send-button {
        margin-left: 0.5rem;
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0 1.1rem;
        min-height: 44px;
        background: linear-gradient(135deg, #6d28d9 0%, #22d3ee 100%);
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        font-weight: 600;
        letter-spacing: 0.01em;
        box-shadow: 0 12px 24px rgba(109, 40, 217, 0.25);
        position: relative;
        overflow: hidden;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease;
      }

      #send-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 30px rgba(109, 40, 217, 0.3);
      }

      #send-button:disabled {
        background-color: var(--text-light);
        cursor: not-allowed;
        box-shadow: none;
        transform: none;
      }

      #send-button::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          120deg,
          rgba(255, 255, 255, 0.1),
          rgba(255, 255, 255, 0.45),
          rgba(255, 255, 255, 0.1)
        );
        opacity: 0;
        transition: opacity 0.2s ease;
      }

      #send-button:not(:disabled):hover::after {
        opacity: 1;
      }

      #send-button.is-sending {
        transform: translateY(0);
        box-shadow: 0 0 24px rgba(34, 211, 238, 0.35);
      }

      .send-icon {
        width: 18px;
        height: 18px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .send-icon svg {
        width: 100%;
        height: 100%;
        fill: currentColor;
      }

      .typing-indicator {
        display: none;
        margin-bottom: 1rem;
        font-style: italic;
        color: var(--text-light);
      }

      .typing-indicator.visible {
        display: block;
      }

      footer {
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-light);
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <h1>test LLM</h1>
        <p class="subtitle">A fresh chat experience with streaming answers</p>
        <span class="tagline">Realtime chat</span>
      </header>

      <section class="utility-panel" aria-labelledby="address-lookup-title">
        <h2 id="address-lookup-title">Address lookup</h2>
        <p>Search for a location to get coordinates and formatted address details.</p>
        <div class="lookup-form">
          <input
            id="address-input"
            type="text"
            placeholder="Enter an address (e.g., 1600 Amphitheatre Parkway)"
            autocomplete="street-address"
          />
          <button id="address-button" type="button">Lookup</button>
        </div>
        <div class="lookup-status" id="address-status"></div>
        <ul class="lookup-results" id="address-results"></ul>
      </section>

      <div class="chat-container">
        <div id="chat-messages" class="chat-messages"></div>

        <div class="typing-indicator" id="typing-indicator">
          AI is thinking...
        </div>

        <div class="chat-status">
          <span class="context-status" id="context-status"></span>
          <span class="presence-status" id="presence-status">Ready</span>
        </div>

        <div class="message-input">
          <textarea
            id="user-input"
            placeholder="Type your message here..."
            rows="1"
            autofocus
          ></textarea>
          <button id="send-button" type="button">
            <span class="send-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true">
                <path
                  d="M3.4 20.6 22 12 3.4 3.4l-.8 6.2L14 12 2.6 14.4l.8 6.2z"
                />
              </svg>
            </span>
            <span class="send-label">Send</span>
          </button>
        </div>
      </div>

      <footer>
        <p>LLM Chat Template &copy; 2025</p>
      </footer>
    </div>

    <!-- Chat app script -->
    <script src="chat.js"></script>
  </body>
</html>
